services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: omni_test
      POSTGRES_USER: omni
      POSTGRES_PASSWORD: omni
    ports:
      - "5432:5432"
    volumes:
      - ./init/01-postgres.sql:/docker-entrypoint-initdb.d/01-postgres.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omni -d omni_test"]
      interval: 5s
      timeout: 3s
      retries: 10

  mysql:
    image: mysql:8
    environment:
      MYSQL_DATABASE: omni_test
      MYSQL_USER: omni
      MYSQL_PASSWORD: omni
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - ./init/02-mysql.sql:/docker-entrypoint-initdb.d/02-mysql.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 10

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Omni!2024"
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - ./init/03-mssql.sql:/usr/config/init-script.sql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Omni!2024' -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  oracle:
    image: gvenzl/oracle-xe:21-slim
    environment:
      ORACLE_PASSWORD: omni
      APP_USER: OMNI
      APP_USER_PASSWORD: omni
    ports:
      - "1521:1521"
    volumes:
      - ./init/04-oracle.sql:/opt/oracle/scripts/startup/04-oracle.sql
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
