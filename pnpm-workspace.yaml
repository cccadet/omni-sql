packages:
  - "apps/*"
  - "packages/*"

# pnpm v11+ settings live here. Permite scripts de build para deps que
# precisam de pós-instalação (esbuild é usado por Vite/Svelte).
onlyBuiltDependencies:
  - esbuild
  - "@sveltejs/vite-plugin-svelte"
  - oracledb
allowBuilds:
  better-sqlite3: set this to true or false
  esbuild: set this to true or false
  oracledb: true
